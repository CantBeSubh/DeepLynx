services:
    app:
        env_file:
            - .env
        build:
            context: ./
            dockerfile: Dockerfiles/Dockerfile.app.local
        ports:
            - 3000:3000
        environment:
           NODE_ENV: production
        depends_on: ["postgres"]
        #entrypoint: /usr/local/bin/entrypoint.sh
    backend:
        env_file:
            - .env
        build:
            context: ./
            dockerfile: Dockerfiles/Dockerfile.backend.local
        ports:
            - 5000:5000
        depends_on: ["postgres"]
        entrypoint: /usr/local/bin/entrypoint.sh
    postgres:
        env_file:
            - .env
        build:
            context: ./database
            dockerfile: Dockerfiles/Dockerfile.db.local
        ports:
            - "5433:5432"
        # healthcheck:    

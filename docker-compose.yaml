services:
  ui:
    build:
      context: ./
      dockerfile: Dockerfiles/ui/Dockerfile.local
      args:
        NEXT_PUBLIC_API_URL: "http://localhost:5000/api"
    environment:
      NODE_ENV: production
      BACKEND_BASE_URL: "http://server:5000/api"
    ports:
      - "3000:3000"
    networks:
      - nexus-network
    depends_on:
      - server

  server:
    build:
      context: ./
      dockerfile: Dockerfiles/server/Dockerfile.local
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: nexuscore
      POSTGRES_DB_NAME: deeplynx
      POSTGRES_DB_HOST: nx-postgres
      POSTGRES_PORT: 5432
      FILE_STORAGE_METHOD: filesystem
      STORAGE_DIRECTORY: /data
      ScalarApi__BaseUrl: http://scalar-api-url:5050 # http://localhost:5000/scalar/, not 5050.
    entrypoint: /usr/local/bin/entrypoint.sh
    ports:
      - "5000:5000"
    networks:
      - nexus-network
    volumes:
      - object_storage:/data
    depends_on:
        - nx-postgres

  nx-postgres:
    build:
      context: ./
      dockerfile: Dockerfiles/database/Dockerfile.local
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=nexuscore
    ports:
      - "5432"
    networks:
      - nexus-network
    volumes:
      - nx_postgres_data:/var/lib/postgresql/data
    
networks:
  nexus-network:
    driver: bridge
  
volumes:
  object_storage:
    driver: local
  nx_postgres_data:
    driver: local
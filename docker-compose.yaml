services:
  ui:
    build:
      context: ./
      dockerfile: Dockerfiles/Dockerfile.app.local
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_OKTA_CLIENT_ID: ${NEXT_PUBLIC_OKTA_CLIENT_ID}
      NEXT_PUBLIC_OKTA_ISSUER: ${NEXT_PUBLIC_OKTA_ISSUER}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    depends_on:
      - nx-postgres

  server:
    build:
      context: ./
      dockerfile: Dockerfiles/Dockerfile.backend.local
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_OKTA_CLIENT_ID: ${NEXT_PUBLIC_OKTA_CLIENT_ID}
      NEXT_PUBLIC_OKTA_ISSUER: ${NEXT_PUBLIC_OKTA_ISSUER}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: nexuscore
      POSTGRES_DB_NAME: deeplynx
      POSTGRES_DB_HOST: nx-postgres
      POSTGRES_PORT: 5432
    depends_on:
      - nx-postgres
    entrypoint: /usr/local/bin/entrypoint.sh
    networks:
      - nexus-network

  nx-postgres:
    build:
      context: ./database
      dockerfile: Dockerfiles/Dockerfile.db.local
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=nexuscore
    ports:
      - "5432"
    volumes:
      - nx-postgres-data:/var/lib/postgresql/data
    networks:
      - nexus-network
    
networks:
  nexus-network:
    driver: bridge
  
volumes:
  nx-postgres-data:
    driver: local
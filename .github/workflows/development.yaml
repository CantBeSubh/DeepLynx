name: Build Development
on:
  workflow_dispatch:
  push:
    branches: ["develop"]

jobs:
  build:
    runs-on: [self-hosted]
    environment: development
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      # Builds the required image
      - shell: bash
        name: Container Build
        env:
          ACR_SP_USER: ${{ secrets.CI_SP_USER }}
          ACR_SP_PASSWORD: ${{ secrets.CI_SP_PASSWORD }}
          ACR_REGISTRY: ${{ secrets.CI_REGISTRY }}
          ACR_PATH: ${{ secrets.CI_REGISTRY_PATH }}
          ACR_SP_TENANT: ${{ secrets.CI_SP_TENANT }}
          ACR_SUBSCRIPTION: ${{ secrets.CI_ACR_SUBSCRIPTION }}
          GITHUB_RUN_NUMBER: ${{ github.RUN_NUMBER }}
          NEXT_PUBLIC_OKTA_CLIENT_ID: ${{ vars.NEXT_PUBLIC_OKTA_CLIENT_ID }}
          OKTA_CLIENT_SECRET: ${{ secrets.OKTA_CLIENT_SECRET }}
          NEXT_PUBLIC_OKTA_ISSUER: ${{ vars.NEXT_PUBLIC_OKTA_ISSUER }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_REDIRECT_LINK: ${{ vars.NEXT_PUBLIC_REDIRECT_LINK }}
        run: |
          cd $GITHUB_WORKSPACE
          az cloud set --name AzureUSGovernment
          az login --service-principal -u $ACR_SP_USER -p $ACR_SP_PASSWORD --tenant $ACR_SP_TENANT
          az account set --subscription $ACR_SUBSCRIPTION

          # Build the Docker images and pass the environment variables as build arguments
          az acr build --registry $ACR_REGISTRY \
            --image $ACR_PATH:deeplynxv3-app-$GITHUB_RUN_NUMBER \
            --file Dockerfiles/Dockerfile.app \
            --build-arg NEXT_PUBLIC_OKTA_CLIENT_ID=${{ vars.NEXT_PUBLIC_OKTA_CLIENT_ID }} \
            --build-arg NEXT_PUBLIC_OKTA_ISSUER=${{ vars.NEXT_PUBLIC_OKTA_ISSUER }} \
            --build-arg NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }} \
            --build-arg NEXT_PUBLIC_REDIRECT_LINK=${{ vars.NEXT_PUBLIC_REDIRECT_LINK }} \
            --build-arg OKTA_CLIENT_SECRET: ${{ secrets.OKTA_CLIENT_SECRET }} \
            --build-arg AUTH_SECRET: ${{ secrets.AUTH_SECRET }} \
            .

          az acr build --registry $ACR_REGISTRY --image $ACR_PATH:deeplynxv3-backend-$GITHUB_RUN_NUMBER --file Dockerfiles/Dockerfile.backend.app \
            --build-arg NEXT_PUBLIC_OKTA_CLIENT_ID=${{ vars.NEXT_PUBLIC_OKTA_CLIENT_ID }} \
            --build-arg NEXT_PUBLIC_OKTA_ISSUER=${{ vars.NEXT_PUBLIC_OKTA_ISSUER }} \
            --build-arg NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }} \
            --build-arg NEXT_PUBLIC_REDIRECT_LINK=${{ vars.NEXT_PUBLIC_REDIRECT_LINK }} \
            --build-arg OKTA_CLIENT_SECRET: ${{ secrets.OKTA_CLIENT_SECRET }} \
            --build-arg AUTH_SECRET: ${{ secrets.AUTH_SECRET }} \
            .

  kubernetes:
    needs: build
    runs-on: [self-hosted]
    environment: development
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      # Download kubectl
      - uses: azure/setup-kubectl@v3

      # Initializes the kube context, introducing kubectl to the cluster
      - uses: azure/k8s-set-context@v3
        name: Configure K8s
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBE_CONFIG_DE_DEV }}
          context: deploy-service-account

      # Create Kubernetes Secrets for sensitive environment variables
      - shell: bash
        name: Create Kubernetes Secrets
        run: |
          kubectl create secret generic app-secrets \
            --from-literal=OKTA_CLIENT_SECRET="${{ secrets.OKTA_CLIENT_SECRET }}" \
            --from-literal=AUTH_SECRET="${{ secrets.AUTH_SECRET }}" \
            --namespace=deeplynxv3-dev \
            --dry-run=client -o yaml | kubectl apply -f -

      # Create Kubernetes ConfigMap for non-sensitive environment variables
      - shell: bash
        name: Create Kubernetes ConfigMap
        run: |
          kubectl create configmap app-config \
            --from-literal=NEXT_PUBLIC_OKTA_CLIENT_ID="${{ vars.NEXT_PUBLIC_OKTA_CLIENT_ID }}" \
            --from-literal=NEXT_PUBLIC_OKTA_ISSUER="${{ vars.NEXT_PUBLIC_OKTA_ISSUER }}" \
            --from-literal=NEXT_PUBLIC_API_URL="${{ vars.NEXT_PUBLIC_API_URL }}" \
            --from-literal=NEXT_PUBLIC_REDIRECT_LINK="${{ vars.NEXT_PUBLIC_REDIRECT_LINK }}" \
            --namespace=deeplynxv3-dev \
            --dry-run=client -o yaml | kubectl apply -f -

      # Overwrites ${VARIABLES} in the kube manifest with secrets
      - shell: bash
        name: Manifest env substitute
        env:
          CI_REGISTRY: ${{ secrets.CI_REGISTRY }}
          CI_REGISTRY_PATH: ${{ secrets.CI_REGISTRY_PATH }}
          GITHUB_RUN_NUMBER: ${{ github.RUN_NUMBER }}
          DATABASE_CONNECTION_STRING: ${{ secrets.DATABASE_CONNECTION_STRING }}
          POSTGRES_DBHOST: ${{ vars.POSTGRES_DBHOST }}
          POSTGRES_DB: ${{ vars.POSTGRES_DB }}
          POSTGRES_USER: ${{ vars.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          DUCKDB_BASE_PATH: ${{ vars.DUCKDB_BASE_PATH }}
        run: |
          cd $GITHUB_WORKSPACE/kubernetes
          envsubst < development.yaml > manifest.yaml

      # Deploys the kube manifest
      - uses: Azure/k8s-deploy@v4
        name: Deploy K8s Workload
        with:
          resource-group: ${{ secrets.AKS_RESOURCE_GROUP }}
          name: ${{ secrets.AKS_CLUSTER_NAME }}
          namespace: deeplynxv3-dev
          action: deploy
          force: true
          strategy: basic
          manifests: |
            kubernetes/manifest.yaml

apiVersion: v1
kind: Namespace
metadata:
  name: deeplynxv3-dev
  labels:
    name: deeplynxv3-dev
---
# Storage Class for DuckDB Azure Files
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: azurefile-duckdb
  namespace: deeplynxv3-dev
provisioner: file.csi.azure.com
parameters:
  skuName: Premium_LRS
reclaimPolicy: Retain
allowVolumeExpansion: true
mountOptions:
  - dir_mode=0777
  - file_mode=0777
  - uid=0
  - gid=0
  - mfsymlinks
  - cache=strict
  - actimeo=30
  - nobrl # disable sending byte range lock requests to the server and for applications which have challenges with posix locks
volumeBindingMode: Immediate

---
# Persistent Volume Claim for DuckDB storage
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: deeplynx-duckdb-pvc
  namespace: deeplynxv3-dev
spec:
  accessModes:
    - ReadWriteMany # Allows multiple pods to access the same volume
  resources:
    requests:
      storage: 20Gi # Adjust size based on your timeseries data needs
  storageClassName: azurefile-duckdb

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: deeplynxv3
  namespace: deeplynxv3-dev
spec:
  selector:
    matchLabels:
      app: deeplynxv3
  template:
    metadata:
      labels:
        app: deeplynxv3
    spec:
      containers:
        - name: deeplynxv3
          image: ${CI_REGISTRY}/${CI_REGISTRY_PATH}:deeplynxv3-app-${GITHUB_RUN_NUMBER}
          imagePullPolicy: Always
          env:
            - name: ConnectionStrings__DefaultConnection
              value: "${DATABASE_CONNECTION_STRING}"
            - name: POSTGRES_DBHOST
              value: ${POSTGRES_DBHOST}
            - name: POSTGRES_DB
              value: ${POSTGRES_DB}
            - name: POSTGRES_USER
              value: ${POSTGRES_USER}
            - name: POSTGRES_PASSWORD
              value: ${POSTGRES_PASSWORD}
            # DuckDB Configuration
            - name: DUCKDB_BASE_PATH
              value: ${DUCKDB_BASE_PATH}
            # - name: TENANT_MODE
            #   value: ${TENANT_MODE}
            # Runtime environment variables from secrets (sensitive)
            - name: OKTA_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: okta-client-secret
            - name: AUTH_TRUST_HOST          # REQUIRED behind proxies/CDNs
              value: "true"
            - name: AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: auth-secret
            - name: NEXTAUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: next-auth-secret
            - name: SERVICE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: service-token
            # Runtime environment variables from configmap (non-sensitive)
            - name: OKTA_CLIENT_ID
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: okta-client-id
            - name: OKTA_ISSUER
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: okta-issuer
            - name: NEXT_PUBLIC_API_URL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: api-url
            - name: NEXTAUTH_URL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: auth-url
            - name: NEXT_PUBLIC_REDIRECT_LINK
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: redirect-link
            - name: BACKEND_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: backend-base-url
          resources:
            limits:
              memory: "4Gi"
              cpu: "1500m"
          ports:
            - containerPort: 3000
          volumeMounts:
            - name: duckdb-storage
              mountPath: /data/duckdb
      volumes:
        - name: duckdb-storage
          persistentVolumeClaim:
            claimName: deeplynx-duckdb-pvc

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: deeplynxbackend
  namespace: deeplynxv3-dev
spec:
  selector:
    matchLabels:
      app: deeplynxbackend
  template:
    metadata:
      labels:
        app: deeplynxbackend
    spec:
      containers:
        - name: deeplynxv3
          image: ${CI_REGISTRY}/${CI_REGISTRY_PATH}:deeplynxv3-backend-${GITHUB_RUN_NUMBER}
          imagePullPolicy: Always
          command: ["/usr/local/bin/entrypoint.sh"]
          env:
            - name: ConnectionStrings__DefaultConnection
              value: ${DATABASE_CONNECTION_STRING}
            - name: POSTGRES_DBHOST
              value: ${POSTGRES_DBHOST}
            - name: POSTGRES_DB
              value: ${POSTGRES_DB}
            - name: POSTGRES_USER
              value: ${POSTGRES_USER}
            - name: POSTGRES_PASSWORD
              value: ${POSTGRES_PASSWORD}
            # DuckDB Configuration (same as frontend)
            - name: DUCKDB_BASE_PATH
              value: ${DUCKDB_BASE_PATH}
            # - name: TENANT_MODE
            #   value: ${TENANT_MODE}
            # Backend may also need these environment variables
            - name: OKTA_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: okta-client-secret
            - name: AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: auth-secret
            - name: SERVICE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: service-token
            - name: OKTA_CLIENT_ID
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: okta-client-id
            - name: OKTA_ISSUER
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: okta-issuer
            - name: NEXT_PUBLIC_API_URL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: api-url
            - name: NEXTAUTH_URL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: auth-url
            - name: NEXT_PUBLIC_REDIRECT_LINK
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: redirect-link
            - name: BACKEND_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: backend-base-url
          resources:
            limits:
              memory: "4Gi"
              cpu: "1500m"
          ports:
            - containerPort: 5000
          volumeMounts:
            - name: duckdb-storage
              mountPath: /data/duckdb
      volumes:
        - name: duckdb-storage
          persistentVolumeClaim:
            claimName: deeplynx-duckdb-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: deeplynxv3-service
  namespace: deeplynxv3-dev
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: 3000
  selector:
    app: deeplynxv3

---
apiVersion: v1
kind: Service
metadata:
  name: deeplynxv3-backend-service
  namespace: deeplynxv3-dev
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: 5000
  selector:
    app: deeplynxbackend

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: deeplynxv3-ingress
  namespace: deeplynxv3-dev
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/configuration-snippet: |
      more_clear_headers "strict-transport-security";
      more_clear_headers "x-content-type-options";
      more_clear_headers "x-frame-options";
      more_clear_headers "content-security-policy";
      more_set_headers "cache-Control: no-cache, no-store";
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/server-snippets: |
      location / {
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_cache_bypass $http_upgrade;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host $host;
        proxy_set_header   X-Cluster-Client-Ip $remote_addr;
        }
spec:
  rules:
    - host: nexus.dev.inl.gov
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: deeplynxv3-service
                port:
                  number: 80
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: deeplynxv3-backend-service
                port:
                  number: 80
          - path: /api/auth
            pathType: Prefix
            backend:
              service:  
                name: deeplynxv3-service
                port:  
                  number: 80 
